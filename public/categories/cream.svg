<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <style>
      .en { font-family: Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif; }
      .ar { font-family: Cairo, "Noto Sans Arabic", "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1024" height="1024" fill="#F5F2EC"/>
  <rect x="112" y="112" width="800" height="800" rx="48" fill="#FFFFFF" filter="url(#shadow)"/>

  <text x="176" y="198" class="en" fill="#1B1B1B" font-size="28" letter-spacing="8">NIVRAN</text>

  <!-- Icon -->
  <g transform="translate(512 338)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#1B1B1B" stroke-width="8">
      <!-- jar base -->
      <path d="M-170 40 c0 36 76 66 170 66s170-30 170-66"/>
      <path d="M-170 40 v70 c0 38 78 70 170 70s170-32 170-70V40"/>
      <ellipse cx="0" cy="40" rx="170" ry="52"/>
      <!-- lid (slightly above) -->
      <g transform="translate(0,-108)">
        <ellipse cx="0" cy="0" rx="182" ry="54"/>
        <path d="M-182 0 v28 c0 38 82 68 182 68s182-30 182-68V0"/>
        <ellipse cx="0" cy="28" rx="182" ry="54"/>
      </g>
    </g>

    <!-- subtle gold accent line -->
    <g stroke="#C9A46A" stroke-width="6">
      <path d="M-70 18 c32 -14 70 -14 102 0"/>
    </g>
  </g>

  <line x1="272" y1="564" x2="752" y2="564" stroke="#D8D1C6" stroke-width="3" stroke-linecap="round"/>

  <g text-anchor="middle" fill="#1B1B1B">
    <text x="512" y="638" class="en" font-size="62" font-weight="500" letter-spacing="12">NIVRAN</text>
    <text x="512" y="708" class="en" font-size="46" font-weight="700">Cream</text>
    <text x="512" y="772" class="ar" font-size="46" font-weight="700" direction="rtl" unicode-bidi="bidi-override">كريم</text>
    <text x="512" y="832" class="en" font-size="30" font-weight="500" opacity="0.9">Wear the calm.</text>
  </g>
</svg>